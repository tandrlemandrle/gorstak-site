<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gorstak — Projects</title>
  <meta name="description" content="Open-source security tools, system utilities, and scripts by Gorstak.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface-hover: #1a2335;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --tag-bg: #1e293b;
      --tag-text: #94a3b8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(10, 14, 23, 0.9);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .logo span { color: var(--accent); }

    .search-box {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: var(--accent); }

    .search-box svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      width: 16px;
      height: 16px;
    }

    .stats {
      color: var(--text-dim);
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .stats strong { color: var(--green); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      padding: 0.35rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      word-break: break-word;
    }

    .card-name:hover { text-decoration: underline; }

    .card-lang {
      padding: 0.2rem 0.6rem;
      background: var(--tag-bg);
      border-radius: 12px;
      font-size: 0.7rem;
      color: var(--tag-text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-desc {
      color: var(--text-dim);
      font-size: 0.85rem;
      line-height: 1.5;
      flex: 1;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: auto;
    }

    .card-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .download-btn:hover { background: var(--accent-hover); }

    .download-btn svg { width: 14px; height: 14px; }

    .btn-group {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .download-btn.outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .download-btn.outline:hover { background: var(--surface-hover); color: var(--text); }

    .loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-dim);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 1rem;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-dim);
    }

    .footer {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-dim);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    .hero {
      text-align: center;
      padding: 2.5rem 1.5rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .hero p {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .links-bar {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-size: 0.82rem;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .link-pill:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      color: var(--accent);
    }

    .link-pill svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .web-search-btn {
      padding: 0.6rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .web-search-btn:hover { background: var(--accent-hover); }

    .web-search-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 14, 23, 0.95);
      backdrop-filter: blur(8px);
      z-index: 1000;
      overflow-y: auto;
      padding-bottom: 2rem;
    }

    .web-search-modal.open { display: block; }

    .web-search-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .web-search-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      position: sticky;
      top: 0;
      background: rgba(10, 14, 23, 0.98);
      padding: 1rem 0;
      z-index: 1001;
    }

    .web-search-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .web-search-close:hover { background: var(--surface); }

    .web-search-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .web-search-results {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .web-result-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s;
    }

    .web-result-item:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
    }

    .web-result-item h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
      margin: 0 0 0.5rem 0;
      text-decoration: none;
      display: inline-block;
    }

    .web-result-item a {
      color: var(--accent);
      text-decoration: none;
    }

    .web-result-item a:hover { text-decoration: underline; }

    .web-result-snippet {
      color: var(--text-dim);
      font-size: 0.9rem;
      line-height: 1.6;
      margin: 0.5rem 0;
    }

    .web-result-source {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.75rem;
    }

    .web-result-source strong { color: var(--green); }

    .web-search-loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
    }

    .web-search-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 1rem;
      animation: spin 0.8s linear infinite;
    }

    .web-search-empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-dim);
    }

    .web-search-empty p { margin: 0.5rem 0; }

    .web-search-error {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 12px;
      padding: 1rem;
      color: #fca5a5;
      margin: 1rem 0;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .header-inner { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      .logo { justify-content: center; }
      .stats { text-align: center; }
      .web-search-btn { width: 100%; }
    }
  </style>
</head>

  <script>
    const DEFAULT_CONFIG = {
      users: ['Gorstak-Zadar'],
      onlyRepos: null,
      excludeRepos: null
    };

    let allRepos = [];
    let activeFilter = 'all';
    let config = { ...DEFAULT_CONFIG };

    async function loadConfig() {
      try {
        const res = await fetch('repos.json');
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.users) && data.users.length) config.users = data.users;
          if (data.onlyRepos != null) config.onlyRepos = Array.isArray(data.onlyRepos) ? data.onlyRepos : null;
          if (data.excludeRepos != null) config.excludeRepos = Array.isArray(data.excludeRepos) ? data.excludeRepos : null;
        }
      } catch (_) { /* use defaults */ }
    }

    async function fetchRepos() {
      try {
        await loadConfig();
        let usedCache = false;
        const res = await fetch('projects.json');
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data) && data.length) {
            allRepos = data;
            usedCache = true;
          }
        }
        if (allRepos.length === 0) {
          const all = [];
          for (const user of config.users) {
            const url = `https://api.github.com/users/${encodeURIComponent(user)}/repos?per_page=100&sort=updated`;
            const r = await fetch(url);
            if (!r.ok) throw new Error(`${user}: ${r.status}`);
            const repos = await r.json();
            repos.filter(repo => !repo.fork).forEach(repo => all.push(repo));
          }
          const byFullName = {};
          all.forEach(r => { byFullName[r.full_name] = r; });
          allRepos = Object.values(byFullName);
        }
        if (config.onlyRepos && config.onlyRepos.length) {
          const set = new Set(config.onlyRepos.map(s => s.toLowerCase()));
          allRepos = allRepos.filter(r => set.has(r.full_name.toLowerCase()));
        }
        if (config.excludeRepos && config.excludeRepos.length) {
          const set = new Set(config.excludeRepos.map(s => s.toLowerCase()));
          allRepos = allRepos.filter(r => !set.has(r.full_name.toLowerCase()));
        }
        allRepos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
        if (!usedCache) await fetchReleaseInfo();
        buildFilters();
        render();
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="empty"><p>Failed to load projects. Try refreshing.</p><p style="margin-top:0.5rem;font-size:0.8rem">${err.message}</p></div>`;
      }
    }

    async function fetchReleaseInfo() {
      const batch = 8;
      for (let i = 0; i < allRepos.length; i += batch) {
        const chunk = allRepos.slice(i, i + batch);
        await Promise.all(chunk.map(async (r) => {
          try {
            const res = await fetch(`https://api.github.com/repos/${r.full_name}/releases?per_page=1`);
            if (res.ok) {
              const rels = await res.json();
              r.latestReleaseUrl = (Array.isArray(rels) && rels.length) ? (rels[0].html_url || null) : null;
            } else r.latestReleaseUrl = null;
          } catch (_) { r.latestReleaseUrl = null; }
        }));
      }
    }

    function buildFilters() {
      const langs = {};
      allRepos.forEach(r => {
        const lang = r.language || 'Other';
        langs[lang] = (langs[lang] || 0) + 1;
      });

      const sorted = Object.entries(langs).sort((a, b) => b[1] - a[1]);
      const container = document.getElementById('filters');

      let html = `<button class="filter-btn active" data-lang="all">All (${allRepos.length})</button>`;
      sorted.forEach(([lang, count]) => {
        html += `<button class="filter-btn" data-lang="${lang}">${lang} (${count})</button>`;
      });
      container.innerHTML = html;

      container.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.lang;
        render();
      });
    }

    function render() {
      const query = document.getElementById('search').value.toLowerCase().trim();
      let filtered = allRepos;

      if (activeFilter !== 'all') {
        filtered = filtered.filter(r => (r.language || 'Other') === activeFilter);
      }

      if (query) {
        filtered = filtered.filter(r =>
          r.name.toLowerCase().includes(query) ||
          (r.description || '').toLowerCase().includes(query) ||
          (r.language || '').toLowerCase().includes(query)
        );
      }

      document.getElementById('stats').innerHTML = `Showing <strong>${filtered.length}</strong> of ${allRepos.length} projects`;

      if (filtered.length === 0) {
        document.getElementById('content').innerHTML = `<div class="empty"><p>No projects match your search.</p><p style="font-size: 0.85rem; margin-top: 0.5rem;">Click the <strong>Web</strong> button to search the internet.</p></div>`;
        return;
      }

      const cards = filtered.map(r => {
        const lang = r.language || 'Unknown';
        const desc = r.description || 'No description provided.';
        const updated = new Date(r.updated_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        const zipUrl = `https://github.com/${r.full_name}/archive/refs/heads/${r.default_branch}.zip`;
        const sizeKB = r.size;
        const sizeLabel = sizeKB >= 1024 ? `${(sizeKB / 1024).toFixed(1)} MB` : `${sizeKB} KB`;

        const releaseBtn = r.latestReleaseUrl
          ? `<a class="download-btn outline" href="${r.latestReleaseUrl}" target="_blank" rel="noopener" title="Latest release">Release</a>`
          : '';
        return `
          <div class="card">
            <div class="card-header">
              <a class="card-name" href="https://github.com/${r.full_name}" target="_blank" rel="noopener">${r.name}</a>
              <span class="card-lang">${lang}</span>
            </div>
            <p class="card-desc">${desc}</p>
            <div class="card-footer">
              <span class="card-meta">${sizeLabel} · Updated ${updated}</span>
              <div class="btn-group">
                ${releaseBtn}
                <a class="download-btn" href="${zipUrl}" download>
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                  ZIP
                </a>
              </div>
            </div>
          </div>`;
      }).join('');

      document.getElementById('content').innerHTML = `<div class="grid">${cards}</div>`;
    }

    document.getElementById('search').addEventListener('input', render);
    fetchRepos();

    // ===== WEB SEARCH INTEGRATION =====
    const webSearchModal = document.getElementById('web-search-modal');
    const webSearchOpenBtn = document.getElementById('web-search-open-btn');
    const webSearchCloseBtn = document.getElementById('web-search-close-btn');
    const webSearchResultsContainer = document.getElementById('web-search-results-container');

    const CACHE_KEY = 'zerch_web_cache';
    const CACHE_TTL = 3600000; // 1 hour

    function getWebCache(key) {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        const cache = raw ? JSON.parse(raw) : {};
        const entry = cache[key];
        if (!entry) return null;
        if (Date.now() - entry.time > CACHE_TTL) {
          delete cache[key];
          localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
          return null;
        }
        return entry.data;
      } catch { return null; }
    }

    function setWebCache(key, data) {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        const cache = raw ? JSON.parse(raw) : {};
        cache[key] = { data, time: Date.now() };
        localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
      } catch {}
    }

    async function fetchDuckDuckGoResults(query) {
      const cacheKey = 'ddg_' + query;
      const cached = getWebCache(cacheKey);
      if (cached) return cached;

      try {
        const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1&d=1`;
        const res = await fetch(url, { mode: 'cors' });
        if (!res.ok) throw new Error('DuckDuckGo request failed');
        const data = await res.json();
        const results = [];

        if (data.AbstractText && data.AbstractURL) {
          results.push({
            title: data.Heading || query,
            url: data.AbstractURL,
            snippet: data.AbstractText,
            source: 'DuckDuckGo'
          });
        }

        (data.RelatedTopics || []).slice(0, 8).forEach(item => {
          if (item.FirstURL && item.Text) {
            results.push({
              title: item.Text.split('-')[0].trim(),
              url: item.FirstURL,
              snippet: item.Text,
              source: 'DuckDuckGo'
            });
          }
        });

        if (results.length > 0) setWebCache(cacheKey, results);
        return results;
      } catch (e) {
        console.warn('DuckDuckGo error (trying fallback):', e);
        // Fallback: try using a CORS proxy
        try {
          const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json`)}`;
          const res = await fetch(proxyUrl);
          if (res.ok) {
            const data = await res.json();
            const results = [];
            if (data.AbstractText && data.AbstractURL) {
              results.push({
                title: data.Heading || query,
                url: data.AbstractURL,
                snippet: data.AbstractText,
                source: 'DuckDuckGo'
              });
            }
            (data.RelatedTopics || []).slice(0, 5).forEach(item => {
              if (item.FirstURL && item.Text) {
                results.push({
                  title: item.Text.split('-')[0].trim(),
                  url: item.FirstURL,
                  snippet: item.Text,
                  source: 'DuckDuckGo'
                });
              }
            });
            if (results.length > 0) setWebCache(cacheKey, results);
            return results;
          }
        } catch (fallbackErr) {
          console.warn('CORS proxy fallback also failed:', fallbackErr);
        }
        return [];
      }
    }

    async function fetchWikipediaResults(query) {
      const cacheKey = 'wiki_' + query;
      const cached = getWebCache(cacheKey);
      if (cached) return cached;

      try {
        const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srwhat=text&srprop=snippet&srlimit=4&format=json`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Wikipedia request failed');
        const data = await res.json();
        const results = [];

        (data.query?.search || []).forEach(item => {
          results.push({
            title: item.title,
            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(item.title)}`,
            snippet: item.snippet.replace(/<[^>]*>/g, ''),
            source: 'Wikipedia'
          });
        });

        setWebCache(cacheKey, results);
        return results;
      } catch (e) {
        console.warn('Wikipedia error:', e);
        return [];
      }
    }

    function renderWebSearchResults(results, query) {
      if (results.length === 0) {
        webSearchResultsContainer.innerHTML = `<div class="web-search-empty"><p>No results found for "${escapeHtml(query)}"</p><p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 0.5rem;">Try a different query or visit <a href="https://www.duckduckgo.com/?q=${encodeURIComponent(query)}" target="_blank" style="color: var(--accent);">DuckDuckGo directly</a>.</p></div>`;
        return;
      }

      const html = results.slice(0, 15).map(r => `
        <div class="web-result-item">
          <h3><a href="${escapeHtmlAttr(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a></h3>
          <p class="web-result-snippet">${escapeHtml(r.snippet)}</p>
          <div class="web-result-source">Source: <strong>${escapeHtml(r.source)}</strong></div>
        </div>
      `).join('');

      webSearchResultsContainer.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeHtmlAttr(url) {
      return (url || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function performWebSearch(query) {
      const q = query.trim();
      if (!q) return;

      webSearchModal.classList.add('open');
      webSearchResultsContainer.innerHTML = '<div class="web-search-loading"><div class="web-search-spinner"></div><p>Searching...</p></div>';

      try {
        let allResults = [];
        const [ddgResults, wikiResults] = await Promise.all([
          fetchDuckDuckGoResults(q),
          fetchWikipediaResults(q)
        ]);

        allResults.push(...ddgResults);
        allResults.push(...wikiResults);

        // Deduplicate by URL
        const seen = new Set();
        allResults = allResults.filter(r => {
          if (seen.has(r.url)) return false;
          seen.add(r.url);
          return true;
        });

        renderWebSearchResults(allResults, q);
      } catch (err) {
        console.error('Web search error:', err);
        webSearchResultsContainer.innerHTML = `<div class="web-search-error"><p>Search encountered an issue. Please try again or visit <a href="https://www.wikipedia.org/search/?search=${encodeURIComponent(q)}" target="_blank" style="color: var(--accent);">Wikipedia</a> directly.</p></div>`;
      }
    }

    webSearchOpenBtn.addEventListener('click', () => {
      const query = document.getElementById('search').value.trim();
      if (query) {
        performWebSearch(query);
      }
    });

    webSearchCloseBtn.addEventListener('click', () => {
      webSearchModal.classList.remove('open');
    });

    webSearchModal.addEventListener('click', (e) => {
      if (e.target === webSearchModal) {
        webSearchModal.classList.remove('open');
      }
    });

    // Allow Escape key to close modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && webSearchModal.classList.contains('open')) {
        webSearchModal.classList.remove('open');
      }
    });
  </script>
</body>
